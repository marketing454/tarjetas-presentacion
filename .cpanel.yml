---
# El repo se clona directamente en card.compulago.com (con .git en la raiz).
# La app Laravel vive en  card.compulago.com/src/  y se sirve desde
#   card.compulago.com/src/public   <-- ese es el Document Root del subdominio.
# Como el clon YA es el codigo servido, no copiamos archivos: solo instalamos
# dependencias y cacheamos dentro de src/. El .env debe estar en src/.env.
deployment:
  tasks:
    - cd src && /bin/mkdir -p bootstrap/cache storage/framework/cache storage/framework/sessions storage/framework/views storage/logs && /bin/chmod -R 775 storage bootstrap/cache
    - cd src && /usr/local/bin/ea-php84 /home/compulag/composer.phar install --no-dev --optimize-autoloader --no-interaction
    - cd src && /usr/local/bin/ea-php84 artisan config:cache && /usr/local/bin/ea-php84 artisan route:cache && /usr/local/bin/ea-php84 artisan view:cache
    - cd src && /usr/local/bin/ea-php84 artisan storage:link || true
