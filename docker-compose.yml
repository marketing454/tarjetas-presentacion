services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: team_app
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
    networks:
      - team_net
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: team_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - team_net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: team_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: team_cards
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - team_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ularavel", "-plaravel123"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: team_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root123
    networks:
      - team_net
    depends_on:
      - db

networks:
  team_net:

volumes:
  mysql_data:
